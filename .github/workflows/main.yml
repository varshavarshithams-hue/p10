name: DevOps Pipeline

on:
 push:
  branches: [ "main" ]
 
jobs:
  build:
   runs-on: windows-latest
   steps:
     - name: Chechout Code
       uses: actions/checkout@v4

     - name: Setup Python
       uses: actions/setup-python@v5
       with:
         python-version: '3.14'

     - name: Run Python File
       run: python run app
